<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LED Slide Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #00ffcc;
            --bg-glass: rgba(15, 15, 20, 0.75);
            --border-glass: rgba(255, 255, 255, 0.15);
            --grid-size: 8px;
        }

        * { box-sizing: border-box; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background: #000; 
            font-family: 'Inter', sans-serif; 
            /* Prevent pull-to-refresh on mobile */
            overscroll-behavior-y: contain; 
            user-select: none;
            -webkit-user-select: none;
        }

        /* LED Display Area */
        #led-container {
            position: relative; width: 100%; height: 100%; 
            display: flex; align-items: center; justify-content: center; 
            background: #050505;
            overflow: hidden;
            cursor: pointer;
        }

        #led-content-wrapper {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            align-items: center;
            width: 100%;
            height: 100%;
        }

        .led-text {
            font-family: 'DotGothic16', monospace;
            font-size: 25vh; /* Responsive font size */
            white-space: nowrap;
            line-height: 1;
            padding: 0 20px;
            /* Text shadow will be applied via JS dynamically */
            will-change: transform, opacity;
        }

        /* Realistic LED Grid Overlay */
        #led-grid {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(0,0,0,0.8) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.8) 1px, transparent 1px);
            background-size: var(--grid-size) var(--grid-size);
            pointer-events: none; /* Let touches pass through */
            z-index: 10;
        }

        /* Scanline effect for extra realism */
        #scanlines {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 6px 100%;
            pointer-events: none; z-index: 11; opacity: 0.5;
        }

        /* Animations */
        @keyframes blinkText {
            0%, 49% { opacity: 1; }
            50%, 100% { opacity: 0; }
        }

        @keyframes scrollText {
            from { transform: translateX(var(--scroll-start, 100vw)); }
            to { transform: translateX(-100%); }
        }

        /* UI Controls */
        .fab {
            position: absolute; bottom: 30px; right: 30px; z-index: 100;
            width: 60px; height: 60px; border-radius: 50%;
            background: var(--bg-glass); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-glass);
            color: white; font-size: 24px; cursor: pointer;
            display: flex; justify-content: center; align-items: center;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            outline: none;
        }
        .fab:hover, .fab:active { transform: scale(1.1); background: rgba(40,40,50,0.8); }

        #controls-panel {
            position: absolute; top: 0; right: 0; width: 100%; max-width: 420px; height: 100%;
            background: var(--bg-glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-left: 1px solid var(--border-glass);
            z-index: 200; padding: 25px; display: flex; flex-direction: column;
            transform: translateX(100%); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            color: #fff; overflow-y: auto; box-shadow: -10px 0 30px rgba(0,0,0,0.5);
        }
        #controls-panel.open { transform: translateX(0); }

        .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .panel-header h2 { margin: 0; font-size: 1.5rem; font-weight: 600; display: flex; align-items: center; gap: 10px; }
        .close-btn { background: none; border: none; color: white; font-size: 1.5rem; cursor: pointer; padding: 5px; }

        /* Form elements */
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-size: 0.9rem; color: #aaa; }
        .form-control { 
            width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border-glass);
            background: rgba(0,0,0,0.3); color: white; font-family: inherit; font-size: 1rem; outline: none;
        }
        .form-control:focus { border-color: var(--primary); }
        
        .color-presets { display: flex; gap: 10px; margin-top: 8px; flex-wrap: wrap; }
        .color-preset { 
            width: 30px; height: 30px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; 
            transition: transform 0.2s;
        }
        .color-preset:hover { transform: scale(1.1); }
        .color-preset.active { border-color: white; box-shadow: 0 0 10px currentColor; }

        .btn {
            width: 100%; padding: 12px; border-radius: 8px; border: none; cursor: pointer;
            font-family: inherit; font-size: 1rem; font-weight: 600; display: flex; justify-content: center; align-items: center; gap: 8px;
            transition: all 0.2s;
        }
        .btn-primary { background: var(--primary); color: #000; }
        .btn-primary:hover { background: #00e6b8; transform: translateY(-2px); }
        .btn-secondary { background: rgba(255,255,255,0.1); color: white; border: 1px solid var(--border-glass); }
        .btn-secondary:hover { background: rgba(255,255,255,0.2); }

        /* Slide List */
        .slides-container { flex: 1; overflow-y: auto; margin: 20px 0; border-top: 1px solid var(--border-glass); padding-top: 20px; }
        .slide-item {
            background: rgba(0,0,0,0.4); border: 1px solid var(--border-glass); border-radius: 10px;
            padding: 15px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center;
            transition: all 0.2s;
        }
        .slide-item.active { border-color: var(--primary); background: rgba(0, 255, 204, 0.05); }
        .slide-info { flex: 1; overflow: hidden; }
        .slide-text-preview { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px; }
        .slide-meta { font-size: 0.8rem; color: #888; display: flex; gap: 10px; }
        .slide-actions { display: flex; gap: 8px; margin-left: 10px; }
        .icon-btn { background: none; border: none; color: #888; cursor: pointer; padding: 8px; border-radius: 5px; transition: all 0.2s; }
        .icon-btn:hover { color: white; background: rgba(255,255,255,0.1); }
        .icon-btn.edit:hover { color: #00ffcc; background: rgba(0, 255, 204, 0.1); }
        .icon-btn.delete:hover { color: #ff4d4d; background: rgba(255, 77, 77, 0.1); }

        /* Global Controls */
        .global-controls { display: flex; gap: 10px; margin-bottom: 20px; }
        .global-controls .btn { flex: 1; }

        /* Responsive */
        @media (max-width: 480px) {
            .fab { bottom: 20px; right: 20px; }
            #controls-panel { max-width: 100%; border-left: none; }
        }
        
        /* Tooltip */
        .tooltip {
            position: absolute;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 12px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 1000;
        }
    </style>
</head>
<body>

    <!-- Main LED Display Area -->
    <div id="led-container">
        <div id="led-content-wrapper">
            <div id="led-text" class="led-text"></div>
        </div>
        <div id="led-grid"></div>
        <div id="scanlines"></div>
    </div>

    <!-- Floating Settings Button -->
    <button id="fab-settings" class="fab"><i class="fa-solid fa-sliders"></i></button>

    <!-- Controls Overlay -->
    <div id="controls-panel">
        <div class="panel-header">
            <h2><i class="fa-solid fa-list-check"></i> LED Manager</h2>
            <button class="close-btn" id="close-settings"><i class="fa-solid fa-xmark"></i></button>
        </div>

        <div class="global-controls">
            <button class="btn btn-secondary" id="btn-play-pause">
                <i class="fa-solid fa-pause"></i> <span>Pause</span>
            </button>
            <button class="btn btn-secondary" id="btn-fullscreen">
                <i class="fa-solid fa-expand"></i> <span>Fullscreen</span>
            </button>
        </div>

        <!-- Add/Edit Slide Form -->
        <div style="background: rgba(255,255,255,0.05); padding: 15px; border-radius: 10px; border: 1px solid var(--border-glass);">
            <h3 id="form-title" style="margin-top: 0; font-size: 1.1rem; border-bottom: 1px solid var(--border-glass); padding-bottom: 10px; margin-bottom: 15px;">
                <i class="fa-solid fa-plus"></i> เพิ่มสไลด์ใหม่ (Add New Slide)
            </h3>
            <div class="form-group">
                <label>ข้อความ (Text)</label>
                <input type="text" id="input-text" class="form-control" placeholder="พิมพ์ข้อความที่นี่..." autocomplete="off">
            </div>
            
            <div class="form-group">
                <label>สี (Color)</label>
                <div class="color-presets" id="color-presets">
                    <!-- JS will populate -->
                </div>
                <input type="hidden" id="input-color" value="#00ffcc">
            </div>

            <div style="display: flex; gap: 10px;">
                <div class="form-group" style="flex: 1;">
                    <label>เอฟเฟกต์ (Effect)</label>
                    <select id="input-effect" class="form-control">
                        <option value="static">นิ่ง (Static)</option>
                        <option value="scroll">เลื่อน (Scroll)</option>
                        <option value="blink">กระพริบ (Blink)</option>
                    </select>
                </div>
                <div class="form-group" style="flex: 1;">
                    <label>เวลา (วินาที)</label>
                    <input type="number" id="input-duration" class="form-control" value="5" min="1" max="60">
                </div>
            </div>

            <div class="form-group" id="speed-container" style="display: none;">
                <label>ความเร็วการเลื่อน (Scroll Speed)</label>
                <select id="input-speed" class="form-control">
                    <option value="0.5">ช้ามาก (Very Slow)</option>
                    <option value="0.8">ช้า (Slow)</option>
                    <option value="1" selected>ปานกลาง (Normal)</option>
                    <option value="1.5">เร็ว (Fast)</option>
                    <option value="2.5">เร็วมาก (Very Fast)</option>
                </select>
            </div>

            <div style="display: flex; gap: 10px;">
                <button class="btn btn-primary" id="btn-save-slide" style="flex: 2;">
                    <i class="fa-solid fa-floppy-disk"></i> บันทึกสไลด์
                </button>
                <button class="btn btn-secondary" id="btn-cancel-edit" style="display: none; flex: 1;">
                    ยกเลิก
                </button>
            </div>
        </div>

        <div class="form-group" style="margin-top: 20px;">
            <label>ขนาดดวงไฟ LED (Grid Size)</label>
            <input type="range" id="input-grid-size" min="3" max="20" value="8" style="width: 100%;">
        </div>

        <div class="form-group" style="margin-top: 15px;">
            <label>ทิศทางการแสดงผล (Orientation)</label>
            <div style="display: flex; gap: 10px;">
                <button class="btn btn-secondary" id="btn-ori-horizontal" style="flex: 1;">
                    <i class="fa-solid fa-mobile-screen-button" style="transform: rotate(-90deg);"></i> แนวนอน
                </button>
                <button class="btn btn-secondary" id="btn-ori-vertical" style="flex: 1;">
                    <i class="fa-solid fa-mobile-screen-button"></i> แนวตั้ง
                </button>
            </div>
        </div>

        <div class="slides-container" id="slide-list">
            <!-- Slide items will be injected here -->
        </div>
    </div>

    <script>
        // App State
        let slides = JSON.parse(localStorage.getItem('led_slides')) || [
            { id: 1, text: 'HELLO WORLD', color: '#00ffcc', effect: 'static', duration: 3, speed: 1 },
            { id: 2, text: 'WELCOME TO LED SLIDE PRO', color: '#ff0055', effect: 'scroll', duration: 8, speed: 1 },
            { id: 3, text: 'SWIPE TO CHANGE', color: '#ffcc00', effect: 'blink', duration: 4, speed: 1 }
        ];
        
        let currentIndex = 0;
        let isPlaying = true;
        let slideTimer = null;
        let gridSize = localStorage.getItem('led_grid_size') || 8;
        let orientationMode = localStorage.getItem('led_orientation_mode') || 'horizontal';

        // Elements
        const ledText = document.getElementById('led-text');
        const ledContentWrapper = document.getElementById('led-content-wrapper');
        const root = document.documentElement;
        
        // Colors preset
        const colors = ['#00ffcc', '#ff0055', '#ffcc00', '#00ccff', '#ff00ff', '#33ff33', '#ffffff'];
        
        // Initialize
        function init() {
            renderColorPresets();
            renderSlideList();
            applyGridSize(gridSize);
            document.getElementById('input-grid-size').value = gridSize;
            
            updateOrientationUI();
            updateOrientation();
            window.addEventListener('resize', updateOrientation);
            
            if (slides.length > 0) {
                showSlide(currentIndex);
            } else {
                ledText.innerText = "NO SLIDES";
            }
            setupEvents();
        }

        // Orientation Logic
        function updateOrientationUI() {
            document.getElementById('btn-ori-horizontal').style.borderColor = orientationMode === 'horizontal' ? 'var(--primary)' : 'var(--border-glass)';
            document.getElementById('btn-ori-horizontal').style.color = orientationMode === 'horizontal' ? 'var(--primary)' : 'white';
            document.getElementById('btn-ori-vertical').style.borderColor = orientationMode === 'vertical' ? 'var(--primary)' : 'var(--border-glass)';
            document.getElementById('btn-ori-vertical').style.color = orientationMode === 'vertical' ? 'var(--primary)' : 'white';
        }

        function setOrientation(mode) {
            orientationMode = mode;
            localStorage.setItem('led_orientation_mode', mode);
            updateOrientationUI();
            updateOrientation();
            showSlide(currentIndex); // Refresh animation
        }

        function updateOrientation() {
            const isPortrait = window.innerHeight > window.innerWidth;
            
            if (orientationMode === 'horizontal' && isPortrait) {
                // Force landscape on portrait device
                ledContentWrapper.style.transform = 'translate(-50%, -50%) rotate(90deg)';
                ledContentWrapper.style.width = '100vh';
                ledContentWrapper.style.height = '100vw';
                ledText.style.fontSize = '25vw';
                root.style.setProperty('--scroll-start', '100vh');
            } else {
                // Normal layout
                ledContentWrapper.style.transform = 'translate(-50%, -50%)';
                ledContentWrapper.style.width = '100%';
                ledContentWrapper.style.height = '100%';
                if (orientationMode === 'vertical' && isPortrait) {
                    ledText.style.fontSize = '15vw'; // Make text fit better in vertical portrait
                } else {
                    ledText.style.fontSize = '25vh';
                }
                root.style.setProperty('--scroll-start', '100vw');
            }
        }

        // Render Color Presets in form
        function renderColorPresets() {
            const container = document.getElementById('color-presets');
            container.innerHTML = '';
            colors.forEach(color => {
                const div = document.createElement('div');
                div.className = 'color-preset' + (color === document.getElementById('input-color').value ? ' active' : '');
                div.style.backgroundColor = color;
                div.style.color = color; // For shadow
                div.dataset.color = color; // Store hex value
                div.onclick = () => {
                    document.querySelectorAll('.color-preset').forEach(el => el.classList.remove('active'));
                    div.classList.add('active');
                    document.getElementById('input-color').value = color;
                };
                container.appendChild(div);
            });
        }

        // Display a specific slide
        function showSlide(index) {
            clearTimeout(slideTimer);
            if (slides.length === 0) {
                ledText.innerHTML = '';
                return;
            }
            
            // Loop boundaries
            if (index >= slides.length) index = 0;
            if (index < 0) index = slides.length - 1;
            currentIndex = index;

            const slide = slides[currentIndex];
            
            // Reset animation to re-trigger it
            ledText.style.animation = 'none';
            ledText.offsetHeight; // trigger reflow
            
            // Set content and styles
            ledText.innerText = slide.text;
            ledText.style.color = slide.color;
            // Realistic LED glow using multiple text-shadows
            ledText.style.textShadow = `
                0 0 5px ${slide.color}, 
                0 0 15px ${slide.color}, 
                0 0 30px ${slide.color}, 
                0 0 50px ${slide.color}
            `;

            // Adjust layout based on effect
            if (slide.effect === 'scroll') {
                ledContentWrapper.style.justifyContent = 'flex-start';
                // Calculate scroll duration based on text length and selected speed
                const textLength = slide.text.length;
                const baseDuration = Math.max(4, textLength * 0.25);
                const slideSpeed = slide.speed || 1;
                const scrollDuration = baseDuration / slideSpeed;
                
                ledText.style.animation = `scrollText ${scrollDuration}s linear infinite`;
                
                // For scroll, we wait the user-defined duration before moving to next slide (if playing)
                if (isPlaying) {
                    slideTimer = setTimeout(nextSlide, slide.duration * 1000);
                }
            } else {
                ledContentWrapper.style.justifyContent = 'center';
                if (slide.effect === 'blink') {
                    ledText.style.animation = `blinkText 1s step-end infinite`;
                } else {
                    ledText.style.animation = 'none';
                }
                
                if (isPlaying) {
                    slideTimer = setTimeout(nextSlide, slide.duration * 1000);
                }
            }

            renderSlideList(); // Update active state in list
        }

        function nextSlide() {
            showSlide(currentIndex + 1);
        }

        function prevSlide() {
            showSlide(currentIndex - 1);
        }

        function togglePlay() {
            isPlaying = !isPlaying;
            const btn = document.getElementById('btn-play-pause');
            if (isPlaying) {
                btn.innerHTML = '<i class="fa-solid fa-pause"></i> <span>Pause</span>';
                showSlide(currentIndex); // Resume timer
            } else {
                btn.innerHTML = '<i class="fa-solid fa-play"></i> <span>Play</span>';
                clearTimeout(slideTimer);
            }
        }

        // UI Updates
        function renderSlideList() {
            const list = document.getElementById('slide-list');
            list.innerHTML = '';
            
            slides.forEach((slide, index) => {
                const item = document.createElement('div');
                item.className = `slide-item ${index === currentIndex ? 'active' : ''}`;
                
                // Effect badge
                let effectIcon = 'fa-minus';
                let effectLabel = slide.effect;
                
                if(slide.effect === 'scroll') {
                    effectIcon = 'fa-angles-left';
                    const speed = slide.speed || 1;
                    const speedText = speed == 0.5 ? 'ช้ามาก' : speed == 0.8 ? 'ช้า' : speed == 1.5 ? 'เร็ว' : speed == 2.5 ? 'เร็วมาก' : 'ปานกลาง';
                    effectLabel = `เลื่อน (${speedText})`;
                } else if(slide.effect === 'blink') {
                    effectIcon = 'fa-lightbulb';
                    effectLabel = 'กระพริบ';
                } else {
                    effectLabel = 'นิ่ง';
                }

                item.innerHTML = `
                    <div class="slide-info" onclick="window.appShowSlide(${index})">
                        <div class="slide-text-preview" style="color: ${slide.color}; text-shadow: 0 0 5px ${slide.color}">${slide.text}</div>
                        <div class="slide-meta">
                            <span><i class="fa-solid ${effectIcon}"></i> ${effectLabel}</span>
                            <span><i class="fa-regular fa-clock"></i> ${slide.duration}s</span>
                        </div>
                    </div>
                    <div class="slide-actions">
                        <button class="icon-btn edit" onclick="window.appEditSlide(${slide.id})">
                            <i class="fa-solid fa-pen"></i>
                        </button>
                        <button class="icon-btn delete" onclick="window.appDeleteSlide(${slide.id})">
                            <i class="fa-solid fa-trash"></i>
                        </button>
                    </div>
                `;
                list.appendChild(item);
            });
        }

        // Actions
        let editingSlideId = null;

        function editSlide(id) {
            const slide = slides.find(s => s.id === id);
            if (!slide) return;
            
            editingSlideId = id;
            document.getElementById('form-title').innerHTML = '<i class="fa-solid fa-pen"></i> แก้ไขสไลด์ (Edit Slide)';
            document.getElementById('input-text').value = slide.text;
            
            // Set Color
            document.getElementById('input-color').value = slide.color;
            document.querySelectorAll('.color-preset').forEach(el => {
                el.classList.toggle('active', el.dataset.color === slide.color);
            });

            document.getElementById('input-effect').value = slide.effect;
            document.getElementById('input-duration').value = slide.duration;
            document.getElementById('input-speed').value = slide.speed || 1;
            
            document.getElementById('speed-container').style.display = slide.effect === 'scroll' ? 'block' : 'none';
            document.getElementById('btn-cancel-edit').style.display = 'block';
            
            document.getElementById('controls-panel').scrollTo({ top: 0, behavior: 'smooth' });
        }

        function cancelEdit() {
            editingSlideId = null;
            document.getElementById('form-title').innerHTML = '<i class="fa-solid fa-plus"></i> เพิ่มสไลด์ใหม่ (Add New Slide)';
            document.getElementById('input-text').value = '';
            document.getElementById('input-duration').value = '5';
            document.getElementById('input-effect').value = 'static';
            document.getElementById('input-speed').value = '1';
            document.getElementById('speed-container').style.display = 'none';
            document.getElementById('btn-cancel-edit').style.display = 'none';
            
            // Reset color to first default
            const firstColor = colors[0];
            document.getElementById('input-color').value = firstColor;
            document.querySelectorAll('.color-preset').forEach(el => {
                el.classList.toggle('active', el.dataset.color === firstColor);
            });
        }

        function saveSlide() {
            const text = document.getElementById('input-text').value.trim();
            const color = document.getElementById('input-color').value;
            const effect = document.getElementById('input-effect').value;
            const duration = document.getElementById('input-duration').value;
            const speed = document.getElementById('input-speed').value;

            if (!text) {
                alert('กรุณาใส่ข้อความ (Please enter text)');
                return;
            }

            if (editingSlideId) {
                // Update existing
                const index = slides.findIndex(s => s.id === editingSlideId);
                if (index !== -1) {
                    slides[index] = {
                        ...slides[index],
                        text, color, effect, 
                        speed: parseFloat(speed) || 1,
                        duration: parseFloat(duration) || 5
                    };
                }
                cancelEdit();
                saveData();
                renderSlideList();
                
                // Refresh if currently playing
                if (slides[currentIndex] && slides[currentIndex].id === editingSlideId) {
                    showSlide(currentIndex);
                }
            } else {
                // Add new
                const newSlide = {
                    id: Date.now(),
                    text, color, effect, 
                    speed: parseFloat(speed) || 1,
                    duration: parseFloat(duration) || 5
                };
                slides.push(newSlide);
                saveData();
                document.getElementById('input-text').value = '';
                renderSlideList();
                
                if (slides.length === 1) {
                    showSlide(0);
                }
            }
        }

        function deleteSlide(id) {
            slides = slides.filter(s => s.id !== id);
            saveData();
            if (slides.length === 0) {
                clearTimeout(slideTimer);
                ledText.innerHTML = '';
            } else if (currentIndex >= slides.length) {
                showSlide(slides.length - 1);
            } else {
                showSlide(currentIndex);
            }
            renderSlideList();
        }

        function saveData() {
            localStorage.setItem('led_slides', JSON.stringify(slides));
        }

        function applyGridSize(size) {
            root.style.setProperty('--grid-size', `${size}px`);
            localStorage.setItem('led_grid_size', size);
        }

        // Fullscreen logic
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                if (document.documentElement.requestFullscreen) {
                    document.documentElement.requestFullscreen();
                } else if (document.documentElement.webkitRequestFullscreen) { /* Safari */
                    document.documentElement.webkitRequestFullscreen();
                } else if (document.documentElement.msRequestFullscreen) { /* IE11 */
                    document.documentElement.msRequestFullscreen();
                }
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                } else if (document.webkitExitFullscreen) { /* Safari */
                    document.webkitExitFullscreen();
                } else if (document.msExitFullscreen) { /* IE11 */
                    document.msExitFullscreen();
                }
            }
        }

        // Global exposing for inline handlers
        window.appShowSlide = (index) => { showSlide(index); };
        window.appDeleteSlide = (id) => { deleteSlide(id); };
        window.appEditSlide = (id) => { editSlide(id); };

        // Events Setup
        function setupEvents() {
            // Panel Toggle
            const panel = document.getElementById('controls-panel');
            document.getElementById('fab-settings').addEventListener('click', () => {
                panel.classList.add('open');
            });
            document.getElementById('close-settings').addEventListener('click', () => {
                panel.classList.remove('open');
            });

            // Form
            document.getElementById('btn-save-slide').addEventListener('click', saveSlide);
            document.getElementById('btn-cancel-edit').addEventListener('click', cancelEdit);
            document.getElementById('input-effect').addEventListener('change', (e) => {
                document.getElementById('speed-container').style.display = e.target.value === 'scroll' ? 'block' : 'none';
            });
            
            // Global Controls
            document.getElementById('btn-play-pause').addEventListener('click', togglePlay);
            document.getElementById('btn-fullscreen').addEventListener('click', toggleFullscreen);

            // Grid Size
            document.getElementById('input-grid-size').addEventListener('input', (e) => {
                applyGridSize(e.target.value);
            });

            // Orientation Buttons
            document.getElementById('btn-ori-horizontal').addEventListener('click', () => setOrientation('horizontal'));
            document.getElementById('btn-ori-vertical').addEventListener('click', () => setOrientation('vertical'));

            // Touch Swipe Logic for iPad/Mobile
            let touchStartX = 0;
            let touchStartY = 0;
            let touchEndX = 0;
            let touchEndY = 0;
            const container = document.getElementById('led-container');

            container.addEventListener('touchstart', e => {
                touchStartX = e.changedTouches[0].screenX;
                touchStartY = e.changedTouches[0].screenY;
            }, {passive: true});

            container.addEventListener('touchend', e => {
                touchEndX = e.changedTouches[0].screenX;
                touchEndY = e.changedTouches[0].screenY;
                handleSwipe();
            }, {passive: true});

            function handleSwipe() {
                const swipeThreshold = 50;
                const dx = touchEndX - touchStartX;
                const dy = touchEndY - touchStartY;
                
                const isPortrait = window.innerHeight > window.innerWidth;
                const isRotated = orientationMode === 'horizontal' && isPortrait;

                if (isRotated) {
                    // If rotated, screen Y axis acts as the logical X axis
                    if (dy < -swipeThreshold) { 
                        clearTimeout(slideTimer);
                        nextSlide(); 
                    } // Swipe Up -> Next
                    if (dy > swipeThreshold) { 
                        clearTimeout(slideTimer);
                        prevSlide(); 
                    } // Swipe Down -> Prev
                } else {
                    // Normal
                    if (dx < -swipeThreshold) { 
                        clearTimeout(slideTimer);
                        nextSlide(); 
                    } // Swipe Left -> Next
                    if (dx > swipeThreshold) { 
                        clearTimeout(slideTimer);
                        prevSlide(); 
                    } // Swipe Right -> Prev
                }
            }

            // Keyboard navigation
            document.addEventListener('keydown', (e) => {
                // Ignore if typing in input
                if(e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;

                if (e.key === 'ArrowRight' || e.key === ' ') {
                    clearTimeout(slideTimer);
                    nextSlide();
                } else if (e.key === 'ArrowLeft') {
                    clearTimeout(slideTimer);
                    prevSlide();
                }
            });
        }

        // Run
        init();

    </script>
</body>
</html>
